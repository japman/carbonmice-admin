# GitLab CI for carbonmice-admin (Rails 8 / Ruby 4.0).
#   test  → build (Docker image → GitLab registry) → deploy (Helm → Kubernetes)
#
# Required CI/CD variables (Settings → CI/CD → Variables; mark secrets Masked):
#   RAILS_MASTER_KEY            decrypts config/credentials.yml.enc
#   APP_DB_PASSWORD             runtime role (carbonmice_admin_app) password
#   MIGRATOR_DB_PASSWORD        migration role (carbonmice_admin_migrator) password
#   KUBE_CONTEXT               GitLab Agent context "path/to/agent:agent-name"
#                              (or configure a KUBECONFIG file variable)
#   DEPLOY_DB_HOST / DEPLOY_DB_NAME   (optional overrides of chart defaults)
# CI_REGISTRY*, CI_* are provided by GitLab automatically.

stages: [test, build, deploy]

default:
  tags: [docker]   # adjust to your runner tags

# ---------------------------------------------------------------------------
# test — mirror the local gate against a throwaway Postgres
# ---------------------------------------------------------------------------
test:
  stage: test
  image: ruby:4.0.0-slim
  services:
    - name: postgres:17
      alias: postgres
  variables:
    POSTGRES_DB: carbonmice_admin_test
    POSTGRES_USER: postgres
    POSTGRES_PASSWORD: password
    POSTGRES_HOST_AUTH_METHOD: trust
    DB_HOST: postgres
    DB_PORT: "5432"
    DB_USER: postgres
    DB_PASSWORD: password
    RAILS_ENV: test
    # Linux runners do NOT hit the macOS pg-fork segfault, so parallel test
    # workers are safe here. Bump if you confirm it stable; default stays 1.
    # PARALLEL_WORKERS: "4"
  cache:
    key:
      files: [Gemfile.lock]
    paths: [vendor/ruby]
  before_script:
    - apt-get update -qq
    - apt-get install -y --no-install-recommends build-essential git libpq-dev libyaml-dev libffi-dev pkg-config postgresql-client
    - bundle config set --local path vendor/ruby
    - bundle install --jobs 4
  script:
    - bin/rails db:test:prepare       # loads structure.sql (admin); test_helper loads core_structure.sql (public)
    - bin/rails test
    - bin/rails test:system           # rack_test driver — no browser needed
    - bundle exec rubocop
    - bundle exec brakeman -q

# ---------------------------------------------------------------------------
# build — production image to the GitLab Container Registry (main + tags only)
# ---------------------------------------------------------------------------
build:
  stage: build
  image: docker:27
  services: [docker:27-dind]
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
    IMAGE: $CI_REGISTRY_IMAGE
  before_script:
    - docker login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" "$CI_REGISTRY"
  script:
    - docker build --target production -t "$IMAGE:$CI_COMMIT_SHORT_SHA" -t "$IMAGE:latest" .
    - docker push "$IMAGE:$CI_COMMIT_SHORT_SHA"
    - docker push "$IMAGE:latest"
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
    - if: '$CI_COMMIT_TAG'

# ---------------------------------------------------------------------------
# deploy — Helm upgrade to Kubernetes (manual gate for production)
# ---------------------------------------------------------------------------
deploy:
  stage: deploy
  image: dtzar/helm-kubectl:3.18
  variables:
    RELEASE: carbonmice-admin
    NAMESPACE: carbonmice
  script:
    - kubectl config use-context "$KUBE_CONTEXT"
    - helm upgrade --install "$RELEASE" deploy/helm/carbonmice-admin
        --namespace "$NAMESPACE" --create-namespace
        --set image.repository="$CI_REGISTRY_IMAGE"
        --set image.tag="$CI_COMMIT_SHORT_SHA"
        --set-string secret.railsMasterKey="$RAILS_MASTER_KEY"
        --set-string secret.appDbPassword="$APP_DB_PASSWORD"
        --set-string secret.migratorDbPassword="$MIGRATOR_DB_PASSWORD"
        ${DEPLOY_DB_HOST:+--set env.DB_HOST=$DEPLOY_DB_HOST}
        ${DEPLOY_DB_NAME:+--set env.DB_NAME=$DEPLOY_DB_NAME}
        --wait --timeout 5m
  environment:
    name: production
    url: https://admin.carbonmice.example
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
      when: manual
