# Single-database app: Solid Queue uses the PRIMARY connection
# (ActiveRecord::Base). The solid_queue_* tables live in the `admin` schema
# (first in schema_search_path), never in `public` (owned by Go). Do NOT add a
# `database:` key — that would route to a non-existent `queue` database.
default: &default
  dispatchers:
    - polling_interval: 1
      batch_size: 500
  workers:
    - queues: "*"
      threads: 3
      processes: <%= ENV.fetch("JOB_CONCURRENCY", 1) %>
      polling_interval: 0.1

development:
  <<: *default

test:
  <<: *default

production:
  <<: *default
