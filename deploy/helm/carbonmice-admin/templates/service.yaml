apiVersion: v1
kind: Service
metadata:
  name: {{ include "carbonmice-admin.fullname" . }}
  labels:
    {{- include "carbonmice-admin.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  selector:
    {{- include "carbonmice-admin.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: web
  ports:
    - name: http
      port: {{ .Values.service.port }}
      targetPort: http
