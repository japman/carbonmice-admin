{{- if not .Values.secret.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "carbonmice-admin.fullname" . }}-secret
  labels:
    {{- include "carbonmice-admin.labels" . | nindent 4 }}
type: Opaque
stringData:
  rails-master-key: {{ required "secret.railsMasterKey is required (or set secret.existingSecret)" .Values.secret.railsMasterKey | quote }}
  app-db-user: {{ .Values.secret.appDbUser | quote }}
  app-db-password: {{ required "secret.appDbPassword is required" .Values.secret.appDbPassword | quote }}
  migrator-db-user: {{ .Values.secret.migratorDbUser | quote }}
  migrator-db-password: {{ required "secret.migratorDbPassword is required" .Values.secret.migratorDbPassword | quote }}
{{- end }}
